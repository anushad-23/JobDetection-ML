<!DOCTYPE html>
<html>
<head>
    <title>JobShield AI - Stats Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; }
        .navbar { background: #020617; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; }
        .navbar h2 { margin: 0; color: #38bdf8; }
        .navbar a { color: #38bdf8; text-decoration: none; }
        .main { padding: 40px; }
        .container { max-width: 1200px; margin: auto; background: #1e293b; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(0,0,0,0.4); }
        h1 { text-align: center; margin-bottom: 40px; }
        .chart-row { display: flex; flex-wrap: wrap; gap: 20px; margin-bottom: 40px; }
        .chart-container { flex: 1; min-width: 400px; background: #0f172a; padding: 20px; border-radius: 10px; }
        .chart-title { text-align: center; margin-bottom: 20px; color: #38bdf8; }
        canvas { max-height: 300px; }
        #wordcloud { text-align: center; }
        #wordcloud img { max-width: 100%; border-radius: 10px; }
        .loading { text-align: center; padding: 40px; font-size: 18px; }
    </style>
</head>
<body>
    <div class="navbar">
        <h2>🚀 JobShield AI</h2>
        <a href="/">← Predict Job</a>
    </div>
    <div class="main">
        <div class="container">
            <h1>📊 Model & Data Analytics Dashboard</h1>
            <div id="loading" class="loading">Loading charts...</div>
            <div id="charts" style="display: none;">
                <!-- Dataset Distribution Pie -->
                <div class="chart-row">
                    <div class="chart-container">
                        <h3 class="chart-title">Dataset Distribution</h3>
                        <canvas id="pieChart"></canvas>
                    </div>
                    <div class="chart-container">
                        <h3 class="chart-title">Model Metrics</h3>
                        <canvas id="metricsBar"></canvas>
                    </div>
                </div>
                <!-- Confusion Matrix Heatmap -->
                <div class="chart-row">
                    <div class="chart-container">
                        <h3 class="chart-title">Confusion Matrix</h3>
                        <canvas id="confMatrix"></canvas>
                    </div>
                    <div class="chart-container">
                        <h3 class="chart-title">Top Fraud Features</h3>
                        <canvas id="featureBar"></canvas>
                    </div>
                </div>
                <!-- Wordcloud -->
                <div class="chart-row">
                    <div class="chart-container" id="wordcloud">
                        <h3 class="chart-title">Fraudulent Jobs Word Cloud</h3>
                        <img id="wcImg" style="display: none;">
                        <p id="noWc">No wordcloud data available.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script>
        fetch('/api/stats')
            .then(r => r.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('charts').style.display = 'block';

                // Pie: Dataset
                new Chart(document.getElementById('pieChart'), {
                    type: 'pie',
                    data: {
                        labels: ['Fake Jobs', 'Real Jobs'],
                        datasets: [{ data: [data.dataset_stats.fraud, data.dataset_stats.real], backgroundColor: ['#ef4444', '#22c55e'] }]
                    },
                    options: { responsive: true }
                });

                // Bar: Metrics
                new Chart(document.getElementById('metricsBar'), {
                    type: 'bar',
                    data: {
                        labels: ['Accuracy', 'Prec(Real)', 'Prec(Fake)', 'Rec(Real)', 'Rec(Fake)', 'F1(Real)', 'F1(Fake)'],
                        datasets: [{ label: 'Score', data: [data.accuracy, data.precision_0, data.precision_1, data.recall_0, data.recall_1, data.f1_0, data.f1_1], backgroundColor: '#38bdf8' }]
                    },
                    options: { responsive: true, scales: { y: { beginAtZero: true, max: 1 } } }
                });

                // Heatmap: Conf Matrix
                const ctx = document.getElementById('confMatrix').getContext('2d');
                new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: ['Predicted Real', 'Predicted Fake'],
                        datasets: [
                            { label: 'Actual Real', data: [data.conf_matrix[0][0], data.conf_matrix[0][1]], backgroundColor: '#22c55e' },
                            { label: 'Actual Fake', data: [data.conf_matrix[1][0], data.conf_matrix[1][1]], backgroundColor: '#ef4444' }
                        ]
                    },
                    options: { responsive: true, indexAxis: 'y' }
                });

                // Bar: Features
                new Chart(document.getElementById('featureBar'), {
                    type: 'bar',
                    data: {
                        labels: data.feature_importance.map(f => f.feature),
                        datasets: [{ label: 'Importance', data: data.feature_importance.map(f => f.importance), backgroundColor: '#38bdf8' }]
                    },
                    options: { responsive: true, indexAxis: 'y' }
                });

                // Wordcloud
                if (data.fraud_wordcloud_b64) {
                    document.getElementById('wcImg').src = 'data:image/png;base64,' + data.fraud_wordcloud_b64;
                    document.getElementById('wcImg').style.display = 'block';
                    document.getElementById('noWc').style.display = 'none';
                }
            });
    </script>
</body>
</html>
